/* ══════════════════════════════════════════════════════
CALCULS
══════════════════════════════════════════════════════ */
function calcKiS(ans) {
const p=ans.filter(a=>a===“P”).length, f=ans.filter(a=>a===“F”).length, a=ans.filter(a=>a===“A”).length;
const sc=ans.reduce((s,x)=>s+TS[x],0);
let pr,dom,co,cl,bg;
if(sc>=8)      {pr=“POSÉ”;    dom=null;                  co=C.pB;cl=C.pL;bg=C.pBg;}
else if(sc<=-8){pr=“FONCEUR”; dom=null;                  co=C.oB;cl=C.oL;bg=C.oBg;}

useEffect(() => {
const d = loadData();

if (d.nowAns) setNA(d.nowAns);
if (d.history) setHist(d.history);

saveData({ kisAns: kA, nowAns: nA, history: hist });
}, [kA, nA, hist]);

/* Enregistre une session dans l’historique */
const pushHistory = (newKis, newNow) => {
const k = newKis ? calcKiS(newKis) : kis;
const n = newNow ? calcNow(newNow) : now;
const nfv = (k && n) ? calcNF(k.sc, n.snv) : null;
setHist(h => […h, { date: Date.now(), kis: k, now: n, nf: nfv }]);
};

const handleFinishKiS = a => {
setKA(a);
pushHistory(a, nA);
setSc(“kis-result”);
};
const handleFinishNow = a => {
setNA(a);
pushHistory(kA, a);
setSc(“now-result”);
};

const resetAll = () => {
setKA(null); setNA(null);
saveData({ kisAns: null, nowAns: null, history: hist });
setSc(“home”); setNav(“home”);
};
const resetHistory = () => {
setHist([]);
saveData({ kisAns: kA, nowAns: nA, history: [] });
};

const goHome   = () => { setSc(“home”); setNav(“home”); };
const doNav    = id => { setNav(id); setSc(id); };
