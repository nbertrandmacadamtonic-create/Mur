*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;background:#0d0f0b;font-family:Georgia,serif;color:#e2e0d4;}
#app{max-width:420px;margin:0 auto;min-height:100%;display:flex;flex-direction:column;background:#0d0f0b;position:relative;}
.screen{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;}

/* NAV */
.nav{display:flex;justify-content:space-around;padding:8px 0 14px;border-top:1px solid #21241b;background:#131510;flex-shrink:0;}
.nav button{background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;font-family:Georgia,serif;padding:2px 10px;transition:color 0.2s;}
.nav button.active{color:#72c44a;}
.nav button:not(.active){color:#2e3026;}

/* TOPBAR */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 12px;border-bottom:1px solid #21241b;flex-shrink:0;}
.topbar button.back{background:none;border:none;color:#848678;font-size:20px;cursor:pointer;width:28px;}
.topbar .title{font-size:11px;letter-spacing:2.5px;font-weight:700;font-family:Georgia,serif;}
.topbar .right{width:28px;text-align:right;color:#848678;font-size:12px;}

/* CARDS */
.card{background:#181b14;border-radius:14px;padding:14px 16px;margin-bottom:10px;}
.card-btn{background:#081408;border:1px solid #4a883066;border-radius:14px;padding:14px 16px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;width:100%;text-align:left;margin-bottom:10px;}
.card-btn.blue{background:#080f1e;border-color:#2a5faa66;}
.card-btn.orange{background:#180e00;border-color:#b86a0866;}

/* PROGRESS */
.progress{display:flex;gap:2px;padding:0 16px;margin-top:10px;flex-shrink:0;}
.progress-bar{flex:1;height:3px;border-radius:2px;background:#21241b;transition:background 0.3s;}
.progress-bar.done{background:#72c44a;}
.progress-bar.active{background:#72c44a88;}

/* ANSWER BUTTONS */
.answer-btn{background:#181b14;border:1.5px solid #21241b;border-radius:13px;padding:11px 14px;cursor:pointer;display:flex;align-items:center;gap:12px;transition:all 0.2s;width:100%;text-align:left;margin-bottom:9px;}
.answer-btn.selected{border-color:var(--ac);}
.answer-btn.faded{opacity:0.26;}
.dot{width:10px;height:10px;border-radius:50%;border:2px solid var(--ac);background:transparent;flex-shrink:0;transition:background 0.2s;}
.dot.filled{background:var(--ac);}

/* RING */
.ring-wrap{position:relative;flex-shrink:0;}
.ring-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}

/* MISC */
.label{font-size:9px;letter-spacing:2px;font-weight:700;}
.big-num{font-size:52px;font-weight:900;line-height:1;}
.zone-label{font-size:11px;letter-spacing:1.5px;font-weight:700;margin-top:4px;}
.btn-primary{width:100%;padding:15px;border:none;border-radius:13px;cursor:pointer;color:#e2e0d4;font-size:15px;font-weight:700;font-family:Georgia,serif;display:flex;justify-content:space-between;align-items:center;}
.tag{font-size:8px;letter-spacing:0.5px;font-weight:700;border-radius:4px;padding:2px 6px;}

/* ORIENTATION BOX */
.orientation-box{border-radius:14px;padding:18px;margin-bottom:14px;}
.orientation-inner{background:#181b14;border-radius:10px;padding:10px 12px;margin-top:8px;}

/* HIST ENTRY */
.hist-entry{background:#181b14;border:1px solid #21241b;border-radius:13px;padding:14px;margin-bottom:10px;}
.hist-pills{display:flex;gap:8px;flex-wrap:wrap;margin-top:8px;}
.hist-pill{border-radius:9px;padding:6px 12px;}
</style>

}

function figSvg(name,sz){
  if(name==="posé")return svgFigPosé(sz);
  if(name==="calme")return svgFigCalme(sz);
  if(name==="funam")return svgFigFunam(sz);
  if(name==="tension")return svgFigTension(sz);
  if(name==="debord")return svgFigDebord(sz);
  return"";
}

// ─── CALCULS ───
function calcKiS(ans){
  const p=ans.filter(a=>a==="P").length,f=ans.filter(a=>a==="F").length,a=ans.filter(a=>a==="A").length;
  const sc=ans.reduce((s,x)=>s+TS[x],0);
  let pr,dom,co,cl,bg;
  if(sc>=8){pr="POSÉ";dom=null;co=C.pB;cl=C.pL;bg=C.pBg;}
  else if(sc<=-8){pr="FONCEUR";dom=null;co=C.oB;cl=C.oL;bg=C.oBg;}
  else if(sc>2){pr="FUNAMBULE";dom="à dominante Posé";co=C.fB;cl=C.fL;bg=C.fBg;}
  else if(sc<-2){pr="FUNAMBULE";dom="à dominante Fonceur";co=C.fB;cl=C.fL;bg=C.fBg;}
  else{pr="FUNAMBULE";dom="équilibré";co=C.fB;cl=C.fL;bg=C.fBg;}
  const info={POSÉ:{te:"Prendre le temps d'analyser",ri:"Immobilisme sous pression",re:"Stabilité et profondeur",tx:"Vous avancez avec méthode et recul. Votre force est la profondeur. Votre défi est de ne pas rester trop longtemps en attente."},
    FUNAMBULE:{te:"S'adapter en continu",ri:"Dispersion ou surcharge",re:"Flexibilité et lecture fine",tx:"Vous jonglez avec les contraintes. Votre force est l'adaptabilité. Votre défi est de trouver votre axe stable."},
    FONCEUR:{te:"Aller vers l'action",ri:"Surcharge et épuisement",re:"Énergie et élan",tx:"Vous avez de l'énergie et de l'élan. Votre force est d'avancer. Votre défi est de doser."}}[pr];
  return{pr,dom,sc,pC:p,fC:f,aC:a,co,cl,bg,...info};
}

function calcNow(sc){
  const raw=sc.reduce((a,b)=>a+b,0),snv=Math.round((raw/8)*50);
  if(snv>=15)return{snv,zo:"ZONE ROUGE",fa:"FREINER",co:C.rB,cl:C.rL,bg:C.rBg,de:"Votre système est en surchauffe. Il a besoin d'être freiné pour éviter l'épuisement.",co2:"Cherchez des exercices qui calment et ralentissent votre système."};
  if(snv>=5)return{snv,zo:"ZONE ORANGE",fa:"RÉGULER",co:C.oB,cl:C.oL,bg:C.oBg,de:"Votre système est en train de monter. Il reste encore adaptable, mais la tension commence à s'installer.",co2:"Cherchez des exercices qui diminuent la tension sans casser votre dynamique."};
  if(snv>=-4)return{snv,zo:"ZONE VERTE",fa:"ENTRETENIR",co:C.fB,cl:C.fL,bg:C.fBg,de:"Votre système est équilibré. Vous êtes dans votre zone optimale de fonctionnement.",co2:"Maintenez cet état. Cherchez des exercices de stabilisation et d'ancrage."};
  return{snv,zo:"ZONE BLEUE",fa:"ACTIVER",co:C.pB,cl:C.pL,bg:C.pBg,de:"Votre système est en veille. Il a besoin d'activation pour retrouver son élan.",co2:"Cherchez des exercices qui stimulent doucement sans forcer."};
}
function calcNF(ks,ns){return Math.round((1-Math.abs(ks)/15)*50+(1-Math.abs(ns)/50)*50);}

// ─── STATE ───
let state={
  screen:"home",nav:"home",
  kisAns:null,nowAns:null,history:[],
  kisStep:0,kisAnswers:[],kisSel:null,
  nowStep:0,nowAnswers:[],nowSel:null
};
function getKis(){return state.kisAns?calcKiS(state.kisAns):null;}
function getNow(){return state.nowAns?calcNow(state.nowAns):null;}
function getNF(){const k=getKis(),n=getNow();return(k&&n)?calcNF(k.sc,n.snv):null;}

function initFromStorage(){
  const d=load();
  if(d.kisAns)state.kisAns=d.kisAns;
  if(d.nowAns)state.nowAns=d.nowAns;
  if(d.history)state.history=d.history;
}

function persist(){save({kisAns:state.kisAns,nowAns:state.nowAns,history:state.history});}

function go(screen){
  state.screen=screen;

}

function pickKiS(t){
  if(state.kisSel!==null)return;
  state.kisSel=t;
  render();
  setTimeout(()=>{
    const na=[...state.kisAnswers,t];
    if(state.kisStep+1<KIS_Q.length){
      state.kisAnswers=na;state.kisStep++;state.kisSel=null;render();
    } else {
      state.kisAns=na;state.kisAnswers=[];state.kisStep=0;state.kisSel=null;
      const k=calcKiS(na),n=getNow(),nfv=(k&&n)?calcNF(k.sc,n.snv):null;
      state.history.push({date:Date.now(),kis:k,now:n,nf:nfv});
      persist();go('kis-result');
    }
  },360);
}

    {r:"61–80",lb:"Bonne",c:C.fB,ic:"ENTRETENIR"},{r:"81–100",lb:"Excellente",c:C.pB,ic:"ACTIVER"}];
  const ai=nf<=30?0:nf<=60?1:nf<=80?2:3;
  const segsHtml=segs.map((s,i)=>`
    <div style="flex:1;text-align:center;background:${i===ai?s.c+'22':'transparent'};border:1px solid ${i===ai?s.c+'88':C.border};border-radius:11px;padding:10px 3px">
      <div style="display:flex;justify-content:center;margin-bottom:6px">${svgFamilyIcon(s.ic,28)}</div>
      <div style="font-size:8px;color:${s.c};font-weight:700;margin-bottom:2px">${s.r}</div>
      <div style="font-size:8px;color:${i===ai?s.c:C.ts}">${s.lb}</div>
    </div>`).join('');
  return`
    <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px 12px;border-bottom:1px solid ${C.border};flex-shrink:0">
      <button style="background:none;border:none;color:${C.ts};font-size:20px;cursor:pointer" onclick="go('history')">←</button>
      <div style="text-align:center">${svgMurLogo(20,C.fL)}<div style="font-size:10px;letter-spacing:2px;color:${C.fL};font-weight:700;margin-top:2px">NEUROFLEX</div></div>
      <div style="width:28px"></div>
    </div>
    <div class="scroll" style="padding:22px 16px">
      <div style="display:flex;justify-content:center;margin-bottom:16px">
        <div style="position:relative;width:200px;height:200px">
          ${svgRing(nf/100,segs[ai].c,200,16)}
          <div style="position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center">
            <div style="font-size:70px;font-weight:900;color:${C.tx};line-height:1">${nf}</div>
            <div style="font-size:14px;color:${C.ts};margin-top:3px">/100</div>
          </div>
        </div>
      </div>
      <div style="text-align:center;margin-bottom:20px">
        <div style="font-size:16px;color:${C.tx};line-height:1.6">${segs[ai].lb} capacité<br/>d'adaptation</div>
      </div>
      <div class="card">
        <div style="display:flex;gap:8px;margin-bottom:14px">${segsHtml}</div>
        <div style="font-size:13px;color:${C.ts};text-align:center;line-height:1.7;padding:12px 0 0;border-top:1px solid ${C.border}">
          Plus votre score est élevé,<br/>plus votre système est souple<br/>et résilient face aux défis.
        </div>
      </div>
    </div>`;
}

// ─── SYNTHÈSE ───
function renderHistory(){
  const kis=getKis(),now=getNow(),nf=getNF();
  let lev=null,lc=C.fB,lb=C.fBg;
  if(now){lev=now.fa;lc=now.co;lb=now.bg;}
  else if(kis){lev=kis.pr==="FONCEUR"?"RÉGULER":kis.pr==="POSÉ"?"ACTIVER":"ENTRETENIR";lc=kis.pr==="FONCEUR"?C.oB:kis.pr==="POSÉ"?C.pB:C.fB;lb=kis.pr==="FONCEUR"?C.oBg:kis.pr==="POSÉ"?C.pBg:C.fBg;}
  const ld={ACTIVER:"Cherchez les exercices portant ce symbole.",ENTRETENIR:"Cherchez les exercices portant ce symbole.",RÉGULER:"Cherchez les exercices portant ce symbole.",FREINER:"Cherchez les exercices portant ce symbole."};

  if(!kis&&!now)return`
    <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px 12px;border-bottom:1px solid ${C.border};flex-shrink:0">
      <button style="background:none;border:none;color:${C.ts};font-size:20px;cursor:pointer" onclick="go('home')">←</button>
      <span style="font-size:11px;letter-spacing:2.5px;color:${C.fL};font-weight:700">SYNTHÈSE</span>
      <div style="width:28px"></div>
    </div>
    <div class="scroll" style="padding:40px 16px;text-align:center;color:${C.ts}">
      ${svgMurLogo(52,C.td)}
      <div style="margin-top:20px;font-size:14px;line-height:1.8">Complétez au moins un test<br/>pour voir votre synthèse.</div>
      <div style="display:flex;flex-direction:column;gap:10px;margin-top:24px">
        <button class="btn-primary" style="background:${C.fB}" onclick="go('kis-quiz')">Commencer ki.S</button>
        <button class="btn-primary" style="background:${C.oB}" onclick="go('now-quiz')">Commencer Ici & Maintenant</button>
      </div>
    </div>`;

  return`
    <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px 12px;border-bottom:1px solid ${C.border};flex-shrink:0">
      <button style="background:none;border:none;color:${C.ts};font-size:20px;cursor:pointer" onclick="go('home')">←</button>
      <span style="font-size:11px;letter-spacing:2.5px;color:${C.fL};font-weight:700">SYNTHÈSE</span>
      <button onclick="go('hist-list')" style="background:none;border:1px solid ${C.border};border-radius:8px;padding:4px 10px;color:${C.ts};font-size:11px;cursor:pointer">Historique</button>
    </div>
    <div class="scroll" style="padding:12px 14px">
      <div style="background:${kis?kis.bg:C.cardAlt};border:1px solid ${kis?kis.co+'66':C.border};border-radius:13px;padding:13px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:9px">
        <div>
          <div style="font-size:14px;font-weight:700;color:${C.tx}">ki.S</div>
          ${kis?`<div style="font-size:13px;color:${C.ts};margin-top:2px">${kis.pr}</div>${kis.dom?`<div style="font-size:11px;color:${C.ts}">${kis.dom}</div>`:""}`:`<button onclick="go('kis-quiz')" style="margin-top:5px;background:${C.fB};border:none;border-radius:7px;padding:5px 12px;color:${C.tx};font-size:11px;cursor:pointer">Commencer</button>`}
        </div>
        ${kis?svgFigCalme(56):""}
      </div>
      <div style="background:${now?now.bg:C.cardAlt};border:1px solid ${now?now.co+'66':C.border};border-radius:13px;padding:13px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:9px">
        <div>
          <div style="font-size:14px;font-weight:700;color:${C.tx}">Ici Maintenant</div>
          ${now?`<div style="font-size:13px;color:${now.cl};font-weight:700;margin-top:2px">${now.snv>0?"+":""}${now.snv} · ${now.zo.replace("ZONE ","Zone ")}</div><div style="font-size:13px;color:${C.tx}">${now.fa}</div>`:`<button onclick="go('now-quiz')" style="margin-top:5px;background:${C.oB};border:none;border-radius:7px;padding:5px 12px;color:${C.tx};font-size:11px;cursor:pointer">Commencer</button>`}
        </div>
        ${now?svgFamilyIcon(now.fa,52):""}
      </div>
      ${nf!==null?`
      <div style="background:${C.cardAlt};border:1px solid ${C.border};border-radius:13px;padding:13px 14px;display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;cursor:pointer" onclick="go('neuroflex')">
        <div>
          <div style="font-size:14px;font-weight:700;color:${C.tx}">NeuroFlex</div>
          <div style="font-size:22px;font-weight:900;color:${C.tx};margin-top:2px">${nf}<span style="font-size:12px;color:${C.ts};font-weight:400"> /100</span></div>
          <div style="font-size:12px;color:${C.ts};margin-top:2px">Bonne capacité d'adaptation</div>
        </div>
        <div style="position:relative;width:58px;height:58px;flex-shrink:0">
          ${svgRing(nf/100,C.fL,58,6)}
          <div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center">
            <div style="font-size:14px;font-weight:900;color:${C.tx}">${nf}</div>
          </div>
        </div>
      </div>`:""}
      ${lev?`
      <div style="background:${lb};border:1px solid ${lc}55;border-radius:13px;padding:16px;display:flex;align-items:center;gap:14px;margin-bottom:9px">
        <div style="flex:1">
          <div style="font-size:13px;color:${C.ts};margin-bottom:4px">Aujourd'hui, votre meilleur levier est de <span style="color:${lc};font-weight:900;font-size:18px">${lev}.</span></div>
          <div style="font-size:12px;color:${C.ts};margin-top:6px">${ld[lev]}</div>
        </div>
        ${svgFamilyIcon(lev,52)}
      </div>`:""}
    </div>`;
}

// ─── HISTORIQUE ───
function renderHistList(){
  const fmt=ts=>{const d=new Date(ts);return d.toLocaleDateString("fr-FR",{day:"2-digit",month:"short",year:"numeric"})+" · "+d.toLocaleTimeString("fr-FR",{hour:"2-digit",minute:"2-digit"});};
  const entries=state.history.length===0
    ?`<div style="text-align:center;padding:48px 0;color:${C.ts}">
        <div style="font-size:32px;margin-bottom:12px;opacity:0.3">📋</div>
        <div style="font-size:14px;line-height:1.8">Aucune session enregistrée.</div>
      </div>`
    :[...state.history].reverse().map(s=>`
      <div class="hist-entry">
        <div style="font-size:10px;color:${C.ts};margin-bottom:8px">${fmt(s.date)}</div>
        <div class="hist-pills">
          ${s.kis?`<div style="background:${C.pBg};border:1px solid ${C.pB}55;border-radius:9px;padding:6px 12px">
            <div style="font-size:9px;color:${C.pL};font-weight:700;margin-bottom:2px">KI.S</div>
            <div style="font-size:13px;color:${C.tx};font-weight:700">${s.kis.pr}</div>
            ${s.kis.dom?`<div style="font-size:10px;color:${C.ts}">${s.kis.dom}</div>`:""}
          </div>`:""}
          ${s.now?`<div style="background:${s.now.bg};border:1px solid ${s.now.co}55;border-radius:9px;padding:6px 12px">
            <div style="font-size:9px;color:${s.now.cl};font-weight:700;margin-bottom:2px">ICI MAINTENANT</div>
            <div style="font-size:13px;color:${C.tx};font-weight:700">${s.now.fa}</div>
            <div style="font-size:10px;color:${C.ts}">${s.now.snv>0?"+":""}${s.now.snv} · ${s.now.zo.replace("ZONE ","Zone ")}</div>
          </div>`:""}
          ${s.nf!==null&&s.nf!==undefined?`<div style="background:${C.cardAlt};border:1px solid ${C.border};border-radius:9px;padding:6px 12px">
            <div style="font-size:9px;color:${C.fL};font-weight:700;margin-bottom:2px">NEUROFLEX</div>
            <div style="font-size:13px;color:${C.tx};font-weight:700">${s.nf}<span style="font-size:10px;color:${C.ts}">/100</span></div>
          </div>`:""}
        </div>
      </div>`).join('');
  return`
    <div style="display:flex;align-items:center;justify-content:space-between;padding:14px 16px 12px;border-bottom:1px solid ${C.border};flex-shrink:0">
      <button style="background:none;border:none;color:${C.ts};font-size:20px;cursor:pointer" onclick="go('history')">←</button>
      <span style="font-size:11px;letter-spacing:2.5px;color:${C.fL};font-weight:700">HISTORIQUE</span>
      <button onclick="clearHistory()" style="background:none;border:1px solid ${C.border};border-radius:8px;padding:4px 10px;color:${C.ts};font-size:11px;cursor:pointer">Effacer</button>
    </div>
    <div class="scroll" style="padding:14px">${entries}</div>`;
}

// ─── CONSEILS ───
const CONS={
  ACTIVER:[{t:"Marche rapide",d:"5–10 min à bon rythme pour réveiller le corps."},{t:"Respiration activante",d:"Inspirez 4 temps, expirez 2 temps. 10 cycles."},{t:"Posture d'ouverture",d:"Épaules arrière, tête haute. Tenez 2 minutes."},{t:"Eau froide",d:"Poignets sous l'eau froide pour stimuler l'éveil nerveux."}],
  ENTRETENIR:[{t:"Scan corporel",d:"3 minutes pour observer chaque partie du corps."},{t:"Respiration cohérente",d:"Inspirez 5, expirez 5. 5 minutes suffisent."},{t:"Ancrage au sol",d:"Pieds à plat, sentez le contact avec le sol."},{t:"Pause sensorielle",d:"5 vus, 4 touchés, 3 entendus, 2 sentis, 1 goûté."}],
  RÉGULER:[{t:"Respiration 4-7-8",d:"Inspirez 4, retenez 7, expirez 8. Répétez 4 fois."},{t:"Décharge physique",d:"Secouez mains et bras 30 secondes."},{t:"Changement d'espace",d:"Sortez 5 min ou changez de pièce."},{t:"Écriture express",d:"3 minutes sans filtre : tout ce qui vous occupe."}],
  FREINER:[{t:"STOP immédiat",d:"Posez tout. Rien pendant 2 minutes."},{t:"Respiration longue",d:"Expirez 2× plus long que l'inspiration. 5 min."},{t:"Grounding",d:"Pieds nus sur le sol. Concentrez-vous sur les sensations."},{t:"Obscurité & silence",d:"Éteignez les écrans. Yeux fermés. 10 min."}]
};
function renderConseils(){
  const now=getNow(),f=now?now.fa:null;
  if(!f)return`
    ${topBar("CONSEILS",C.fL,"go('home')")}
    <div class="scroll" style="padding:40px 16px;text-align:center;color:${C.ts}">
      ${svgIcoEntretenir(56)}
      <div style="margin-top:18px;font-size:14px;line-height:1.8">Complétez «Ici & Maintenant»<br/>pour voir vos conseils personnalisés.</div>
      <button class="btn-primary" style="background:${C.oB};margin-top:24px" onclick="go('now-quiz')">Commencer →</button>
    </div>`;
  const items=CONS[f].map((c,i)=>`
    <div class="card" style="display:flex;gap:13px;align-items:flex-start;margin-bottom:9px">
      <div style="width:30px;height:30px;border-radius:50%;background:${now.co}20;border:1px solid ${now.co}44;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px;font-weight:900;color:${now.cl}">${i+1}</div>
      <div>
        <div style="color:${C.tx};font-weight:700;font-size:14px;margin-bottom:4px">${c.t}</div>
        <div style="color:${C.ts};font-size:13px;line-height:1.6">${c.d}</div>
      </div>
    </div>`).join('');
  return`
    ${topBar("CONSEILS",C.fL,"go('home')")}
    <div class="scroll" style="padding:14px">
      <div style="display:flex;align-items:center;gap:14px;background:${now.bg};border:1px solid ${now.co}44;border-radius:13px;padding:13px;margin-bottom:14px">
        ${svgFamilyIcon(f,44)}
        <div>
          <div style="font-size:9px;color:${now.cl};font-weight:700;margin-bottom:3px;letter-spacing:2px">VOTRE FAMILLE D'OUTILS</div>
          <div style="font-size:22px;font-weight:900;color:${C.tx}">${f.charAt(0)+f.slice(1).toLowerCase()}</div>
        </div>
      </div>
      ${items}
    </div>`;
}

// ─── À PROPOS ───
function renderAbout(){
  const rows=[
    {fig:svgFigPosé(44),t:"Scientifique",d:"Basée sur la plasticité du système nerveux autonome."},
    {fig:svgFigFunam(44),t:"Personnalisée",d:"Adaptée à votre profil et votre état du moment."},
    {fig:svgFigTension(44),t:"Évolutive",d:"Réévaluez-vous régulièrement pour affiner votre lecture."},
    {fig:svgIcoRéguler(44),t:"Concrète",d:"Des outils pratiques pour agir au bon moment."}
  ];
  const rowsHtml=rows.map(r=>`
    <div class="card" style="display:flex;gap:14px;align-items:flex-start;margin-bottom:10px">
      <div style="flex-shrink:0">${r.fig}</div>
      <div>
        <div style="color:${C.tx};font-weight:700;font-size:14px;margin-bottom:4px">${r.t}</div>
        <div style="color:${C.ts};font-size:13px;line-height:1.5">${r.d}</div>
      </div>
    </div>`).join('');
  const fams=[{id:"ACTIVER",c:C.pB,d:"Manque\nd'énergie"},{id:"ENTRETENIR",c:C.fB,d:"Équilibre\ndisponible"},{id:"RÉGULER",c:C.oB,d:"Tension\nmodérée"},{id:"FREINER",c:C.rB,d:"Surcharge\nà freiner"}];
  const famsHtml=fams.map(f=>`
    <div style="flex:1;text-align:center;background:${C.cardAlt};border:1px solid ${C.border};border-radius:11px;padding:9px 3px">
      <div style="display:flex;justify-content:center;margin-bottom:5px">${svgFamilyIcon(f.id,26)}</div>
      <div style="font-size:7px;font-weight:700;color:${f.c};margin-bottom:2px">${f.id}</div>
      ${f.d.split('\n').map(l=>`<div style="font-size:7px;color:${C.ts};line-height:1.3">${l}</div>`).join('')}
    </div>`).join('');
  return`
    ${topBar("À PROPOS",C.fL,"go('home')")}
    <div class="scroll" style="padding:22px 16px">
      <div style="text-align:center;margin-bottom:24px">
        ${svgMurLogo(50)}
        <div style="font-size:9px;letter-spacing:5px;color:${C.ts};margin-top:9px">MUR</div>
        <div style="font-size:22px;font-weight:900;color:${C.tx};margin-top:4px">Flexibilité Neuronale</div>
      </div>
      ${rowsHtml}
      <div style="margin-top:10px">
        <div style="font-size:9px;letter-spacing:2px;color:${C.ts};margin-bottom:10px;font-weight:700">4 FAMILLES D'OUTILS</div>
        <div style="display:flex;gap:8px">${famsHtml}</div>
      </div>
    </div>`;
}

// ─── RENDER ───
function render(){
  const el=document.getElementById('screen');
  const s=state.screen;
  let html="";
  if(s==="home")         html=renderHome();
  else if(s==="kis-quiz")html=renderKiSQuiz();
  else if(s==="kis-result")html=renderKiSResult();
  else if(s==="now-quiz")html=renderNowQuiz();
  else if(s==="now-result")html=renderNowResult();
  else if(s==="neuroflex")html=renderNF();
  else if(s==="history") html=renderHistory();
  else if(s==="hist-list")html=renderHistList();
  else if(s==="conseils")html=renderConseils();
  else if(s==="about")   html=renderAbout();
  el.innerHTML=`<div class="screen" style="display:flex;flex-direction:column;height:100%">${html}</div>`;
  renderNav();
}

function resetAll(){
  state.kisAns=null;state.nowAns=null;
  state.kisStep=0;state.kisAnswers=[];state.kisSel=null;
  state.nowStep=0;state.nowAnswers=[];state.nowSel=null;
  persist();go('home');
}
function clearHistory(){state.history=[];persist();render();}

// ─── INIT ───
initFromStorage();
render();
</script>
